<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connecting…</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8f8f6; color: #1a1a2e; }
    .box { text-align: center; padding: 2rem; border-radius: 0.75rem; background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 360px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #1e3a5f; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <p id="msg">Completing sign-in…</p>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');
      const errorDesc = params.get('error_description');

      if (error) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').textContent = 'Error: ' + (errorDesc || error);
        document.getElementById('msg').className = 'error';
        if (window.opener) {
          window.opener.postMessage({ type: 'oauth_callback', error: errorDesc || error }, window.location.origin);
        }
        return;
      }

      if (code) {
        document.getElementById('msg').textContent = 'Sign-in successful! Closing…';
        if (window.opener) {
          window.opener.postMessage({ type: 'oauth_callback', code }, window.location.origin);
        }
        setTimeout(() => window.close(), 800);
        return;
      }

      // Hash fragment (implicit flow fallback)
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const accessToken = hash.get('access_token');
      if (accessToken) {
        document.getElementById('msg').textContent = 'Sign-in successful! Closing…';
        if (window.opener) {
          window.opener.postMessage({ type: 'oauth_callback', accessToken }, window.location.origin);
        }
        setTimeout(() => window.close(), 800);
        return;
      }

      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').textContent = 'No token received. Please try again.';
      document.getElementById('msg').className = 'error';
    })();
  </script>
</body>
</html>
